name: i18n duplicate keys

on:
  pull_request:
    paths:
      - 'src/vs/workbench/contrib/vibeide/browser/react/src/vibe-settings-tsx/vibeSettingsRu.ts'
      - 'scripts/vibe-i18n-dupes.mjs'
      - '.github/workflows/i18n-dupes.yml'
  push:
    branches: [main]
    paths:
      - 'src/vs/workbench/contrib/vibeide/browser/react/src/vibe-settings-tsx/vibeSettingsRu.ts'
      - 'scripts/vibe-i18n-dupes.mjs'
      - '.github/workflows/i18n-dupes.yml'

jobs:
  i18n-dupes:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install typescript in isolation (no repo tree, no native build)
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/tsdep"
          cd "$RUNNER_TEMP/tsdep"
          npm init -y >/dev/null
          npm install typescript@6 --no-audit --no-fund
          mkdir -p "$GITHUB_WORKSPACE/node_modules"
          ln -s "$RUNNER_TEMP/tsdep/node_modules/typescript" "$GITHUB_WORKSPACE/node_modules/typescript"
      - name: Fail on duplicate keys in vibeSettingsRu / EN bundles
        run: node scripts/vibe-i18n-dupes.mjs
